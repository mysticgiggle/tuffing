name: VS Code Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: windows-2025

    steps:
      - name: Install VS Code CLI manually
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://update.code.visualstudio.com/latest/win32-x64-user/stable" `
            -OutFile "$env:TEMP\vscode-cli.exe"

          Start-Process `
            -FilePath "$env:TEMP\vscode-cli.exe" `
            -ArgumentList "/VERYSILENT /MERGETASKS=!runcode" `
            -Wait

          $codePath = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin"
          echo "$codePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run VS Code Tunnel
        shell: powershell
        run: |
          code.exe tunnel --accept-server-license-terms

name: VS Code Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: windows-2025-vs2026

    steps:
      - name: Download VS Code ZIP
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://update.code.visualstudio.com/latest/win32-x64-archive/stable" `
            -OutFile "$env:TEMP\vscode.zip"

          Expand-Archive `
            -Path "$env:TEMP\vscode.zip" `
            -DestinationPath "$env:TEMP\vscode" `
            -Force

      - name: Run VS Code Tunnel
        shell: powershell
        run: |
          & "$env:TEMP\vscode\Code.exe" tunnel --accept-server-license-terms

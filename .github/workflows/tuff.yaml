name: VS Code Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: windows-2025

    steps:
      - name: Install VS Code CLI manually
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://update.code.visualstudio.com/latest/win32-x64-user/stable" `
            -OutFile "$env:TEMP\vscode-setup.exe"

          Start-Process `
            -FilePath "$env:TEMP\vscode-setup.exe" `
            -ArgumentList "/VERYSILENT /MERGETASKS=!runcode,addtopath" `
            -Wait

      - name: Verify installation
        shell: powershell
        run: |
          $codeCmd = Get-ChildItem `
            "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd"

          Write-Host "Found CLI at $($codeCmd.FullName)"

          & $codeCmd.FullName --version

      - name: Run VS Code Tunnel
        shell: powershell
        run: |
          $codeCmd = "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd"

          & $codeCmd tunnel --accept-server-license-terms
